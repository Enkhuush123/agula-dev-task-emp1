<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Даатгуулагчид</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Даатгуулагчид</h1>
        <nav>
          <a href="./index.html">Нүүр</a>
          <a href="./customers.html" aria-current="page">Даатгуулагчид</a>
          <a href="./policies.html">Гэрээнүүд</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div id="messageBox"></div>

      <section class="page-grid">
        <div class="card">
          <h2>Даатгуулагч бүртгэх</h2>
          <form id="customerForm">
            <div class="form-row">
              <label>Нэр</label>
              <input type="text" id="first_name" required />
            </div>
            <div class="form-row">
              <label>Овог</label>
              <input type="text" id="last_name" required />
            </div>
            <div class="form-row">
              <label>Регистрийн дугаар</label>
              <input type="text" id="register_number" required />
            </div>
            <div class="form-row">
              <label>Төрсөн огноо</label>
              <input type="date" id="birth_date" required />
            </div>
            <div class="form-row">
              <label>Утасны дугаар</label>
              <input type="text" id="phone" required />
            </div>
            <button type="submit">Бүртгэх</button>
          </form>
        </div>

        <div class="card">
          <h2>Даатгуулагчдын жагсаалт</h2>
          <div id="customersList"></div>
        </div>
      </section>

      <div class="card">
        <h2>Даатгуулагчийн дэлгэрэнгүй</h2>
        <div id="customerDetails">
          Дэлгэрэнгүй харахын тулд даатгуулагч сонгоно уу.
        </div>
      </div>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/customers.js"></script>
  </body>
</html>
